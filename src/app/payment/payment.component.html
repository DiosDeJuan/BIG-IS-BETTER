<!-- payment.component.html -->
<form id="payment-form" (ngSubmit)="onSubmit()">
    <ngx-stripe-card
      #card
      [options]="cardOptions"
      [elementsOptions]="elementsOptions">
    </ngx-stripe-card>
    <div #cardErrors id="card-errors" role="alert"></div>
    <button type="submit">Enviar Pago</button>
</form>
